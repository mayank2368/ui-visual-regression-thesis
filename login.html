<!doctype html>
<html>
  <head>
    <title>Login</title>
    <style>
      body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        margin-top: 100px;
      }
      .box {
        border: 1px solid #ccc;
        padding: 20px;
        width: 300px;
      }
      button {
        width: 100%;
        background: red;
        padding: 20px;
        color: white;
      }

    <div class="box">
      <h2>Login</h2>
      <input placeholder="Email" /><br /><br />
      <input placeholder="Password" type="password" /><br /><br />
      <button>Login</button>
    </div>
  </body>
</html>
